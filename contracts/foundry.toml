[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.34"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
fs_permissions = [{access = "read-write", path = "./deployments"}]

[profile.ci]
verbosity = 4
fuzz = { runs = 1024 }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
arb_sepolia = "${ARB_SEPOLIA_RPC_URL}"

[etherscan]
arb_sepolia = {key = "${ETHERSCAN_API_KEY}", chain = 421614}
